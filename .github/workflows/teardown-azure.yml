name: 🧨 Teardown · Azure · Manual Dispatch

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Type DELETE to confirm teardown'
        required: true

permissions:
  id-token: write
  contents: read

jobs:
  teardown:
    name: Delete resource group
    if: inputs.confirm == 'DELETE'
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure OIDC login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Teardown
        run: bash scripts/teardown-azure.sh

      - name: Append ledger entry
        if: always()
        run: |
          bash scripts/ledger-write.sh \
            --action=teardown-azure \
            --status="${{ job.status }}" \
            --actor="${{ github.actor }}" \
            --sha="${{ github.sha }}"

      - name: Write job summary
        if: always()
        run: |
          {
            echo "## 🧨 Teardown Summary"
            echo "- Status: ${{ job.status }}"
          } >> "$GITHUB_STEP_SUMMARY"

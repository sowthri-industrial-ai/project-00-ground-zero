models:
  - type: main
    engine: openai
    model: gpt-4o-mini

rails:
  input:
    flows:
      - check user message off-topic
  output:
    flows:
      - self check output

define user ask off topic
  "what's the weather"
  "tell me a joke"
  "what's your favorite movie"

define bot refuse off topic
  "I can only answer questions about the NIST AI RMF. Please ask about AI risk management."

define flow check user message off-topic
  user ask off topic
  bot refuse off topic
  stop

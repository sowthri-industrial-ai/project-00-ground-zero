version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: langfuse
      POSTGRES_PASSWORD: langfuse
      POSTGRES_DB: langfuse
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U langfuse"]
      interval: 10s
    ports: ["5432:5432"]

  pgvector:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: rag
      POSTGRES_PASSWORD: rag
      POSTGRES_DB: rag
    volumes:
      - pgvector_data:/var/lib/postgresql/data
      - ./infra/local/pgvector-init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports: ["5433:5432"]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rag"]
      interval: 10s

  langfuse:
    image: langfuse/langfuse:3
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://langfuse:langfuse@postgres:5432/langfuse
      NEXTAUTH_SECRET: local-dev-only-not-for-prod
      SALT: local-dev-only-not-for-prod
      NEXTAUTH_URL: http://localhost:3000
    ports: ["3000:3000"]
    healthcheck:
      test: ["CMD-SHELL", "wget --spider -q http://localhost:3000/api/public/health || exit 1"]
      interval: 30s

  ollama:
    image: ollama/ollama:latest
    volumes:
      - ollama_data:/root/.ollama
    ports: ["11434:11434"]
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 1"]
      interval: 30s

  hello-ai:
    profiles: ["payload"]
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      - langfuse
      - pgvector
      - ollama
    environment:
      MODE: local
      LANGFUSE_HOST: http://langfuse:3000
      OLLAMA_HOST: http://ollama:11434
      PGVECTOR_DSN: postgresql://rag:rag@pgvector:5432/rag
    ports: ["8080:8080"]

volumes:
  postgres_data:
  pgvector_data:
  ollama_data:
